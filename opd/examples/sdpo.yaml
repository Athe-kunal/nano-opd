# Config for opd/trainer/train_sdpo.py — Self-Distillation Policy
# Optimization (SDPO), EMA self-teacher conditioned on environment feedback.
#
# Usage:
#   python opd/trainer/train_sdpo.py opd/examples/sdpo.yaml
#   python opd/trainer/train_sdpo.py opd/examples/sdpo.yaml lr=1e-5 num_steps=50
#
# `???` = must be overridden (here or via `key=value` CLI override).

# -----------------------------------------------------------------------
# Model — student and teacher share the same checkpoint; teacher is synced
# to the student after every optimizer step via the chosen sync method.
student_model: Qwen/Qwen2.5-1.5B-Instruct
# Number of student (FSDP) ranks. The teacher occupies rank
# train_world_size in the torchrun world. Hardware-dependent; supplied by
# the launcher script.
train_world_size: 1

# -----------------------------------------------------------------------
# Algorithm
algorithm: jsd
distill_top_k: 100  # Top-K vocab for KL distillation
student_chunk_size: 128
teacher_chunk_size: 128
tis_clip: 0.0  # TIS importance-weight clip C (0 disables)

# -----------------------------------------------------------------------
# Generation
num_samples: 4  # Completions per prompt (group size G in Algorithm 1)
max_new_tokens: 8192
temperature: 1.0
top_k: 50
rollout_worker_url: http://${rollout_host}:${rollout_port}
rollout_worker_world_size: 1

# -----------------------------------------------------------------------
# Training
lr: 1e-6
weight_decay: 0.0
max_grad_norm: 1.0
num_steps: 100
prompts_per_step: 8
train_batch_size: 4
# Optimizer step every N minibatches. null = one step per full rollout batch
# (accumulate everything). Effective batch size = train_batch_size * grad_accum_steps.
grad_accum_steps: 1
epochs: 1
max_prompt_len: 1024  # Hard cap on prompt tokens. Raises if exceeded.
max_response_len: 8192  # Cap on response tokens. Truncates silently if exceeded.
sharding_strategy: FULL_SHARD
gradient_checkpointing: true
scheduler: cosine  # One of: cosine, linear, constant
warmup_ratio: 0.05

# -----------------------------------------------------------------------
# Teacher sync — controls how the self-teacher tracks the student.
# One of: ema, trust_region, hard_sync, on_policy (see SYNC_METHODS).
sync_method: ema
# [ema] teacher <- alpha*student + (1-alpha)*teacher.
# Small alpha -> stable but lagging teacher.
ema_alpha: 0.05
# [trust_region] teacher <- beta*student + (1-beta)*initial_weights.
# Anchors the teacher to the pre-trained distribution.
trust_region_beta: 0.05
hard_sync_every_n: 100  # [hard_sync] Full copy every N optimizer steps.

# -----------------------------------------------------------------------
# Runtime
device_type: ""
run_name: dummy
save_dir: opd_checkpoints
save_every: 0
seed: 0
eval_every: 1
eval_k: 4
eval_max_tokens: 8192
sciknoweval_test_size: 0.1
# One of: dapo_math, livecodebench, sciknoweval
dataset: dapo_math

# -----------------------------------------------------------------------
# GPU assignment. These are 0-based LOCAL indices into the launcher's
# world GPU list (the CUDA_VISIBLE_DEVICES the launcher script was started
# with) — not physical GPU IDs. E.g. with CUDA_VISIBLE_DEVICES=2,3,
# rollout_gpus: "0" means physical GPU 2. If CUDA_VISIBLE_DEVICES wasn't
# set, these are used as physical IDs directly.
#   train_gpus must not overlap rollout_gpus or teacher_gpus (enforced by the launcher).
#   rollout_gpus and teacher_gpus may be the same list to colocate vLLM + teacher.
train_gpus: "1"        # student FSDP training ranks
rollout_gpus: "0"      # vLLM rollout worker
teacher_gpus: "0"      # teacher model rank (exactly one GPU)

# -----------------------------------------------------------------------
# Rollout worker (vLLM HTTP server the launcher script starts)
rollout_host: 127.0.0.1
rollout_port: 8048
rollout_gpu_mem_util: 0.5  # vLLM GPU memory fraction
weight_transfer_backend: nccl
use_wandb: true

# -----------------------------------------------------------------------
# Post-training math evaluation (opd.eval.eval_math.run_eval), run once
# after training finishes. Reuses the already-running, weight-synced
# rollout worker — no separate vLLM engine or checkpoint loading needed.
skip_eval: false  # true always forces post-training eval off, regardless of dataset
posttrain_eval_datasets: aime_2025,aime_2024,hmmt_2025
posttrain_eval_max_new_tokens: 38912
posttrain_eval_temperature: 1.0
posttrain_eval_top_k: -1
posttrain_eval_val_n: 6  # samples per problem for pass@k
posttrain_eval_wandb_project: ""
posttrain_eval_wandb_run_name: ${run_name}
posttrain_eval_step: ${num_steps}
